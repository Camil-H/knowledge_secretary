name: daily-digest

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC — podcast first
    - cron: "30 6 * * *"   #06:30 UTC — newsletter + youtube
  workflow_dispatch:
    inputs:
      task:
        description: "newsletter | youtube | podcast | all"
        default: "all"

permissions:
  contents: write          # commit history/ + state/ back; upload podcast release assets

concurrency:
  group: digest-state      # serialize runs so commits + Pages publishes don't collide
  cancel-in-progress: false

jobs:
  podcast:
    if: github.event.schedule == '0 6 * * *' || contains(fromJSON('["podcast","all"]'), github.event.inputs.task)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262   # v4.4.0
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86   # v5.4.2
        with:
          python-version: "3.12"
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: uv sync --frozen
      - run: uv run playwright install --with-deps chromium   # podcastfy fetches source URLs via a browser
      - name: Generate podcast episode
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}   # transcript LLM
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}   # podcast TTS (Google Cloud)
          GH_TOKEN: ${{ github.token }}   # gh release upload for podcast mp3s (this repo)
        run: uv run python -m src.run podcast
      - name: Commit history + state and publish site
        uses: ./.github/actions/publish
        with:
          commit-prefix: podcast
          pages-token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          pages-repository: ${{ vars.PAGES_REPOSITORY || 'Camil-H/camil-h.github.io' }}
          pages-destination-dir: ${{ vars.PAGES_DESTINATION_DIR || 'knowledge_secretary' }}

  digest:
    if: github.event.schedule == '30 6 * * *' || contains(fromJSON('["newsletter","youtube","all"]'), github.event.inputs.task)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262   # v4.4.0
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86   # v5.4.2
        with:
          python-version: "3.12"
      - run: uv sync --frozen
      # twitter-cli is invoked as a subprocess, not imported as a library, so `uv tool install`
      # (not a project dependency) is correct; it also keeps its scraping deps out of uv.lock and
      # isolates failures so only the optional X source degrades, not the newsletter+youtube job.
      # Pinned exact version so a new release can't break the X source unnoticed; bump deliberately.
      - name: Install twitter-cli (X source for the newsletter; optional)
        run: uv tool install twitter-cli==0.8.5 || echo "twitter-cli install failed; X will degrade to empty"
      - name: Run newsletter (uses X source via twitter-cli)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TWITTER_AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}   # X source; optional, degrades to empty
          TWITTER_CT0: ${{ secrets.TWITTER_CT0 }}
        run: uv run python -m src.run newsletter || echo "::warning::newsletter task failed; continuing so youtube still runs"
      - name: Run youtube digest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: uv run python -m src.run youtube || echo "::warning::youtube task failed; continuing to publish"
      - name: Commit history + state and publish site
        uses: ./.github/actions/publish
        with:
          commit-prefix: digest
          pages-token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          pages-repository: ${{ vars.PAGES_REPOSITORY || 'Camil-H/camil-h.github.io' }}
          pages-destination-dir: ${{ vars.PAGES_DESTINATION_DIR || 'knowledge_secretary' }}
