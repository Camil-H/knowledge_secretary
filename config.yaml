# ============================================================================
# knowledge_secretary configuration
# Sources are defined per task (each spec carries its own `key`). Adding a blog
# or channel is one line under the relevant task; adding a task is a new bucket.
# Secrets are referenced as ${ENV_VAR} and injected from GitHub Actions secrets.
#
# Source spec kinds:
#   feed    -> RSS/Atom; give `url`, OR `handle` (YouTube @handle, auto-resolved)
#   pubmed  -> NCBI E-utilities; give `queries`
#   biorxiv -> bioRxiv API; give `categories`
#   twitter -> agent-reach; give `handles` (degrades to nothing if cookie stale)
#   enrich: [article_text | transcript]  -> optional post-fetch enrichment
# ============================================================================

timezone: America/New_York
window_hours: 24          # newsletter lookback; youtube uses its own ET clock window

# --- LLM tiers (see src/core/llm.py) ---------------------------------------
models:
  podcast:                # one long generation -> reserve big-output model
    primary: ["gemini/gemini-2.5-flash"]
    openrouter_free: true
  summarize:              # many small calls -> high-throughput, then fallback
    primary: ["groq/llama-3.3-70b-versatile", "gemini/gemini-2.5-flash"]
    openrouter_free: true

# --- Tasks (each bucket owns its sources + declares delivery) ---------------
tasks:
  newsletter:
    deliver: [email]
    sources:
      # blogs (feed URLs live-verified 2026-07-21)
      - { key: pipeline,   kind: feed, section: "Blogs", url: "https://www.science.org/blogs/pipeline/feed", enrich: [article_text] }
      - { key: lifescivc,  kind: feed, section: "Blogs", url: "https://lifescivc.com/feed/", enrich: [article_text] }
      - { key: endpoints,  kind: feed, section: "Blogs", url: "https://endpts.com/feed/" }   # bodies paywalled; teaser only
      # papers / preprints
      - { key: pubmed_dd,  kind: pubmed,  section: "Papers & Preprints", queries: ["drug discovery", "small molecule inhibitor"] }   # TODO: refine with your MeSH terms
      - { key: biorxiv_dd, kind: biorxiv, section: "Papers & Preprints", categories: ["biochemistry", "pharmacology and toxicology"] }
      # X / Twitter
      - { key: x_biotech,  kind: twitter, section: "Social/X", handles: ["bradloncar", "JacobPlieth", "Sports_Bios"] }

  youtube:
    deliver: [email]
    window_et: { start: "08:00", end: "07:59" }   # yesterday 08:00 ET -> today 07:59 ET, inclusive
    sources:
      - { key: yt_physionic,    kind: feed, section: "Biology & Health", handle: "@Physionic",              enrich: [transcript] }
      - { key: yt_dhio,         kind: feed, section: "Biology & Health", handle: "@DigitalHealthInsideOut", enrich: [transcript] }
      - { key: yt_bekey,        kind: feed, section: "Biology & Health", handle: "@BeKey-Hub",              enrich: [transcript] }
      - { key: yt_passescience, kind: feed, section: "Pure Science",     handle: "@PasseScience",           enrich: [transcript] }
      - { key: yt_veritasium,   kind: feed, section: "Pure Science",     handle: "@veritasium",             enrich: [transcript] }
      - { key: yt_minutephysics,kind: feed, section: "Pure Science",     handle: "@MinutePhysics",          enrich: [transcript] }
      - { key: yt_quanta,       kind: feed, section: "Pure Science",     handle: "@QuantaScienceChannel",   enrich: [transcript] }
      - { key: yt_scienceeton,  kind: feed, section: "Pure Science",     handle: "@ScienceEtonnante",       enrich: [transcript] }
      - { key: yt_aleph0,       kind: feed, section: "Pure Science",     handle: "@Aleph0",                 enrich: [transcript] }
      - { key: yt_eljj,         kind: feed, section: "Pure Science",     handle: "@ElJj",                   enrich: [transcript] }
      - { key: yt_underscore,   kind: feed, section: "Tech & Engineering", handle: "@Underscore_",          enrich: [transcript] }
      - { key: yt_wendover,     kind: feed, section: "Tech & Engineering", handle: "@Wendoverproductions",  enrich: [transcript] }
      - { key: yt_heureka,      kind: feed, section: "Economics",        handle: "@Heu7reka",               enrich: [transcript] }
      - { key: yt_crashcourse,  kind: feed, section: "Other",            handle: "@crashcourse",            enrich: [transcript] }

  podcast:
    deliver: [podcast_feed]
    topics_file: topics.yaml

# --- Delivery --------------------------------------------------------------
delivery:
  email:
    smtp_host: "${SMTP_HOST}"       # TODO: blitzwincash.com SMTP or smtp.gmail.com
    smtp_port: 587
    username: "${SMTP_USERNAME}"
    password: "${SMTP_PASSWORD}"
    from: "${SMTP_FROM}"
    to: ["ops@blitzwincash.com"]
  podcast_feed:
    site_dir: "site"
    feed_path: "site/feed.xml"
    base_url: "${PAGES_BASE_URL}"   # e.g. https://<user>.github.io/knowledge_secretary
    podcast_title: "Knowledge Secretary — Technical Deep Dives"
    github_repo: "${GITHUB_REPOSITORY}"   # auto-set in Actions; used for release upload
