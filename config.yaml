# ============================================================================
# knowledge_secretary configuration — FRAMEWORK settings only.
# Your source lists live per task in src/tasks/<task>/sources.yaml (committed).
# Secrets are referenced as ${ENV_VAR} and injected from GitHub Actions secrets.
# ============================================================================

timezone: America/New_York
window_hours: 24          # newsletter lookback; youtube uses its own ET clock window

# --- LLM tiers (see src/core/llm.py) ---------------------------------------
models:
  # OpenRouter-only: live zero-cost models ($0 tokens), ranked and tried in order
  # with 429 backoff. A one-time $10 OpenRouter top-up lifts the free cap to
  # 1000 req/day (20 RPM stays fixed).
  podcast:                # ranked by output tokens (one long generation)
    primary: []
    openrouter_free: true
  summarize:              # ranked by context window (many small calls)
    primary: []
    openrouter_free: true

# --- Tasks (sources live in each task's sources.yaml) ----------------------
tasks:
  newsletter:
    deliver: [site]
  youtube:
    deliver: [site]
    window_et: { start: "08:00", end: "07:59" }   # yesterday 08:00 ET -> today 07:59 ET, inclusive
  podcast:
    deliver: [site]

# --- Delivery --------------------------------------------------------------
# Single deliverer: `site`. Each task's output is stored per-day under history_dir
# (committed to this repo, pruned to history_days) and the last N days are rendered
# to out_dir/index.html (newest day expanded, older days behind <details> toggles).
# The workflow publishes out_dir/ to the GitHub Pages repo (camilharoune.com).
delivery:
  site:
    history_dir: "history"
    history_days: 7
    out_dir: "public"
    title: "Knowledge Secretary"
    subtitle: "Daily biopharma newsletter, YouTube digest, and technical podcast"
    episode_repo: "${GITHUB_REPOSITORY}"   # this repo's Releases host the podcast mp3s
