# ============================================================================
# knowledge_secretary configuration
# Sources are defined per task (each spec carries its own `key`). Adding a blog
# or channel is one line under the relevant task; adding a task is a new bucket.
# Secrets are referenced as ${ENV_VAR} and injected from GitHub Actions secrets.
#
# Source spec kinds:
#   feed    -> RSS/Atom; give `url`, OR `handle` (YouTube @handle, auto-resolved)
#   pubmed  -> NCBI E-utilities; give `queries`
#   biorxiv -> bioRxiv API; give `categories`
#   twitter -> agent-reach; give `handles` (degrades to nothing if cookie stale)
#   enrich: [article_text | transcript]  -> optional post-fetch enrichment
# ============================================================================

timezone: America/New_York
window_hours: 24          # newsletter lookback; youtube uses its own ET clock window

# --- LLM tiers (see src/core/llm.py) ---------------------------------------
models:
  # OpenRouter-only: live zero-cost models ($0 tokens), ranked and tried in order
  # with 429 backoff. A one-time $10 OpenRouter top-up lifts the free cap to
  # 1000 req/day (20 RPM stays fixed). See src/core/llm.py.
  podcast:                # ranked by output tokens (one long generation)
    primary: []
    openrouter_free: true
  summarize:              # ranked by context window (many small calls)
    primary: []
    openrouter_free: true

# --- Tasks (each bucket owns its sources + declares delivery) ---------------
tasks:
  newsletter:
    deliver: [email]
    sources:
      # blogs (feed URLs live-verified 2026-07-21)
      - { key: pipeline,        kind: feed, section: "Blogs", url: "https://www.science.org/blogs/pipeline/feed", enrich: [article_text] }
      - { key: lifescivc,       kind: feed, section: "Blogs", url: "https://lifescivc.com/feed/", enrich: [article_text] }
      - { key: decodingbio,     kind: feed, section: "Blogs", url: "https://decodingbio.substack.com/feed" }   # BioByte; full content in RSS
      - { key: sciencebasedmed, kind: feed, section: "Blogs", url: "https://sciencebasedmedicine.org/feed/", enrich: [article_text] }   # broad; off-topic items dropped by the item prompt
      - { key: nintil,          kind: feed, section: "Blogs", url: "https://nintil.com/rss.xml", enrich: [article_text] }               # broad; off-topic items dropped by the item prompt
      # news sites
      - { key: endpoints,    kind: feed, section: "News", url: "https://endpts.com/feed/" }   # bodies paywalled; teaser only
      - { key: statnews,     kind: feed, section: "News", url: "https://www.statnews.com/feed/" }   # mostly paywalled; teaser only
      - { key: biopharmadive,kind: feed, section: "News", url: "https://www.biopharmadive.com/feeds/news/", enrich: [article_text] }
      # (Evaluate Vantage excluded: no public RSS — /resources and /vantage return 403)
      # papers / preprints / journals
      - { key: pubmed_dd,  kind: pubmed,  section: "Papers & Preprints", queries: ["drug discovery", "small molecule inhibitor"] }   # TODO: refine with your MeSH terms
      - { key: biorxiv_dd, kind: biorxiv, section: "Papers & Preprints", categories: ["biochemistry", "pharmacology and toxicology"] }
      - { key: nrd,        kind: feed, section: "Papers & Preprints", url: "https://www.nature.com/nrd.rss" }    # Nature Reviews Drug Discovery (abstracts)
      - { key: nrdp,       kind: feed, section: "Papers & Preprints", url: "https://www.nature.com/nrdp.rss" }   # Nature Reviews Disease Primers (abstracts)
      # regulatory
      - { key: fda_press,  kind: feed, section: "Regulatory", url: "https://www.fda.gov/about-fda/contact-fda/stay-informed/rss-feeds/press-releases/rss.xml", enrich: [article_text] }
      # podcasts — TODO(S2T): needs a speech-to-text enricher to transcribe episode audio
      #   before summarizing. Candidates (atelfo's list): The Long Run (Timmerman), Mendelspod,
      #   OncoPharm, Nature Podcast, TWiV. Then add e.g.:
      #   - { key: the_long_run, kind: feed, section: "Podcasts", url: "<rss>", enrich: [s2t] }
      # X / Twitter (active handles from atelfo's biopharma-news list; @AndyBiotech dropped as inactive)
      - { key: x_biotech,  kind: twitter, section: "Social/X", handles: ["bradloncar", "JacobPlieth", "Sports_Bios", "bio_clouseau", "BioStocks", "Prof_Oak_", "paras_biotech", "andrewpannu", "BertrandBio"] }

  youtube:
    deliver: [email]
    window_et: { start: "08:00", end: "07:59" }   # yesterday 08:00 ET -> today 07:59 ET, inclusive
    sources:
      - { key: yt_physionic,    kind: yt_channel, section: "Biology & Health",   handle: "@Physionic",              enrich: [transcript] }
      - { key: yt_dhio,         kind: yt_channel, section: "Biology & Health",   handle: "@DigitalHealthInsideOut", enrich: [transcript] }
      - { key: yt_bekey,        kind: yt_channel, section: "Biology & Health",   handle: "@BeKey-Hub",              enrich: [transcript] }
      - { key: yt_passescience, kind: yt_channel, section: "Pure Science",       handle: "@PasseScience",           enrich: [transcript] }
      - { key: yt_veritasium,   kind: yt_channel, section: "Pure Science",       handle: "@veritasium",             enrich: [transcript] }
      - { key: yt_minutephysics,kind: yt_channel, section: "Pure Science",       handle: "@MinutePhysics",          enrich: [transcript] }
      - { key: yt_quanta,       kind: yt_channel, section: "Pure Science",       handle: "@QuantaScienceChannel",   enrich: [transcript] }
      - { key: yt_scienceeton,  kind: yt_channel, section: "Pure Science",       handle: "@ScienceEtonnante",       enrich: [transcript] }
      - { key: yt_aleph0,       kind: yt_channel, section: "Pure Science",       handle: "@Aleph0",                 enrich: [transcript] }
      - { key: yt_eljj,         kind: yt_channel, section: "Pure Science",       handle: "@ElJj",                   enrich: [transcript] }
      - { key: yt_underscore,   kind: yt_channel, section: "Tech & Engineering", handle: "@Underscore_",            enrich: [transcript] }
      - { key: yt_wendover,     kind: yt_channel, section: "Tech & Engineering", handle: "@Wendoverproductions",    enrich: [transcript] }
      - { key: yt_heureka,      kind: yt_channel, section: "Economics",          handle: "@Heu7reka",               enrich: [transcript] }
      - { key: yt_crashcourse,  kind: yt_channel, section: "Other",              handle: "@crashcourse",            enrich: [transcript] }

  podcast:
    deliver: [podcast_feed]
    topics_file: topics.yaml

# --- Delivery --------------------------------------------------------------
delivery:
  email:
    smtp_host: "${SMTP_HOST}"       # TODO: smtp.gmail.com
    smtp_port: 587
    username: "${SMTP_USERNAME}"
    password: "${SMTP_PASSWORD}"
    from: "${SMTP_FROM}"
    to: ["ops@blitzwincash.com"]
  podcast_feed:
    site_dir: "site"
    feed_path: "site/feed.xml"
    base_url: "${PAGES_BASE_URL}"   # e.g. https://<user>.github.io/knowledge_secretary
    podcast_title: "Knowledge Secretary — Technical Deep Dives"
    github_repo: "${GITHUB_REPOSITORY}"   # auto-set in Actions; used for release upload
