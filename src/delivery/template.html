<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>$title</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    --bg: #FFF7F4;
    --surface: #FFFFFF;
    --text: #1a1a2e;
    --text-secondary: #6b6580;
    --text-tertiary: #9a93a8;
    --accent: #f4d06f;
    --border: rgba(0, 0, 0, 0.07);
    --border-strong: rgba(0, 0, 0, 0.12);
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
    --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06);
    --radius: 14px;
    color-scheme: light;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141420;
      --surface: #1c1c30;
      --text: #f0ebe8;
      --text-secondary: #a09ab0;
      --text-tertiary: #706a80;
      --border: rgba(255, 255, 255, 0.07);
      --border-strong: rgba(255, 255, 255, 0.12);
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.25);
      color-scheme: dark;
    }
  }
  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    max-width: 760px;
    margin: 0 auto;
    padding: 2.5rem 1.25rem 4rem;
    line-height: 1.6;
    color: var(--text);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
  }
  h1 { font-size: 1.9rem; font-weight: 700; letter-spacing: -0.025em; margin: 0 0 0.15rem; }
  .subtitle { color: var(--text-secondary); margin: 0; }
  .updated { color: var(--text-tertiary); font-size: 0.8rem; margin-top: 0.4rem; }
  .day { margin: 2.25rem 0; }
  .day > h2 { font-size: 1.05rem; font-weight: 600; color: var(--text-secondary); letter-spacing: -0.01em; margin: 0 0 0.9rem; }
  details.day summary {
    cursor: pointer;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--text-secondary);
    padding: 0.25rem 0 0.75rem;
    list-style: none;
  }
  details.day summary::-webkit-details-marker { display: none; }
  details.day summary::before { content: "\25B8  "; color: var(--text-tertiary); }
  details.day[open] summary::before { content: "\25BE  "; }
  article.task {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    padding: 1.4rem 1.6rem;
    margin: 1rem 0;
    transition: box-shadow 0.2s ease, border-color 0.2s ease;
  }
  article.task:hover { box-shadow: var(--shadow-md); border-color: var(--border-strong); }
  .task-label {
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-tertiary);
    margin: 0 0 0.85rem;
  }
  .task h1, .task h2, .task h3, .task h4 {
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1.3;
    margin: 1.3rem 0 0.5rem;
  }
  .task h1, .task h2 { font-size: 1.1rem; }
  .task h3, .task h4 { font-size: 1rem; }
  .task-label + * { margin-top: 0; }
  .notice {
    background: rgba(244, 208, 111, 0.14);
    border: 1px solid rgba(244, 208, 111, 0.55);
    border-radius: 10px;
    padding: 0.55rem 0.85rem;
    margin: 0 0 1rem;
    font-size: 0.85rem;
    color: var(--text-secondary);
  }
  .task p { margin: 0.55rem 0; color: var(--text-secondary); }
  .task ul, .task ol { margin: 0.4rem 0 0.9rem; padding-left: 1.4rem; color: var(--text-secondary); }
  .task li { margin: 0.3rem 0; }
  .task strong { color: var(--text); }
  audio { width: 100%; margin-top: 0.5rem; }
  .topic { color: var(--text-secondary); font-style: italic; }
  a {
    color: var(--text);
    text-decoration: underline;
    text-decoration-color: var(--accent);
    text-underline-offset: 2px;
  }
  a:hover { text-decoration-color: var(--text); }
</style>
</head>
<body>
<h1>$title</h1>
<p class="subtitle">$subtitle</p>
<p class="updated">Updated <time class="js-datetime" datetime="$updated">$updated</time></p>
$days
<script>
  // Render UTC dates in the viewer's locale format, pinned to UTC so the calendar day never drifts.
  for (const el of document.querySelectorAll("time.js-date"))
    el.textContent = new Date(el.getAttribute("datetime"))
      .toLocaleDateString(undefined, {dateStyle: "full", timeZone: "UTC"});
  for (const el of document.querySelectorAll("time.js-datetime"))
    el.textContent = new Date(el.getAttribute("datetime"))
      .toLocaleString(undefined, {dateStyle: "medium", timeStyle: "short", timeZone: "UTC"}) + " UTC";
</script>
</body>
</html>
