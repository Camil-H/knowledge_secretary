<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>$title</title>
<style>
  :root { color-scheme: light; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    max-width: 780px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
    line-height: 1.55;
    color: #1c1c1c;
    background: #fbfbfa;
  }
  h1 { margin-bottom: 0.2rem; }
  .subtitle { color: #555; margin-top: 0; }
  .updated { color: #888; font-size: 0.85rem; }
  .day {
    margin: 1.75rem 0;
    padding: 1rem 1.25rem;
    background: #fff;
    border: 1px solid #e3e2df;
    border-radius: 10px;
  }
  .day h2 { margin-top: 0; }
  details.day summary {
    cursor: pointer;
    font-weight: 600;
    font-size: 1.1rem;
    padding: 0.25rem 0;
    list-style: none;
  }
  details.day summary::-webkit-details-marker { display: none; }
  details.day summary::before { content: "▸ "; }
  details.day[open] summary::before { content: "▾ "; }
  article.task {
    margin-top: 1.25rem;
    padding-top: 1rem;
    border-top: 1px solid #eee;
  }
  article.task:first-of-type { border-top: none; padding-top: 0; }
  article.task h3 { margin-bottom: 0.4rem; }
  audio { width: 100%; margin-top: 0.4rem; }
  .topic { color: #444; font-style: italic; }
  a { color: #0a5; }
</style>
</head>
<body>
<h1>$title</h1>
<p class="subtitle">$subtitle</p>
<p class="updated">Updated <time class="js-datetime" datetime="$updated">$updated</time></p>
$days
<script>
  // Reformat UTC dates to the viewer's locale (js-date: calendar day, no tz shift; js-datetime: instant).
  for (const el of document.querySelectorAll("time.js-date"))
    el.textContent = new Date(el.getAttribute("datetime"))
      .toLocaleDateString(undefined, {dateStyle: "long", timeZone: "UTC"});
  for (const el of document.querySelectorAll("time.js-datetime"))
    el.textContent = new Date(el.getAttribute("datetime"))
      .toLocaleString(undefined, {dateStyle: "medium", timeStyle: "short"});
</script>
</body>
</html>
